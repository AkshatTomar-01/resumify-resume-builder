services:
  # Backend - Node/Express API
  - type: web
    name: resume-builder-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: IMAGEKIT_PRIVATE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: OPENAI_MODEL
        sync: false
      - key: CLIENT_URL
        sync: false

  # Frontend - React/Vite Static Site
  - type: web
    name: resume-builder-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
